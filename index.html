<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    >

    <title>Anniversary AR Experience</title>

    <!-- Google Model Viewer -->
    <script
        type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }

        .header p {
            margin: 0;
            color: #d1d5db;
        }

        model-viewer {
            width: 100%;
            flex: 1;
            min-height: 520px;
            background: radial-gradient(
                circle,
                #374151 0%,
                #111827 70%
            );
        }

        .ar-button {
            position: absolute;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);

            border: none;
            border-radius: 999px;
            padding: 14px 24px;

            background: white;
            color: #111827;

            font-size: 16px;
            font-weight: bold;
            cursor: pointer;

            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);

            width: calc(100% - 40px);
            max-width: 420px;

            padding: 12px 16px;
            border-radius: 12px;

            background: rgba(0, 0, 0, 0.65);
            text-align: center;
            font-size: 14px;
        }

        .footer {
            padding: 12px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <main class="page">

        <header class="header">
            <h1>Our Anniversary Journey</h1>
            <p>Place our anniversary model in your space.</p>
        </header>

        <model-viewer
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
            ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"

            alt="Anniversary 3D model"

            ar
            ar-modes="webxr scene-viewer quick-look"
            ar-placement="floor"

            camera-controls
            auto-rotate
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1">

            <div class="instruction">
                Rotate the model using your finger, or tap the button below
                to place it in your environment.
            </div>

            <button
                slot="ar-button"
                class="ar-button">
                View in AR
            </button>

        </model-viewer>

        <footer class="footer">
            Anniversary AR Studio
        </footer>

    </main>
</body>
</html>
