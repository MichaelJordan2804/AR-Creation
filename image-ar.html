<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0, user-scalable=no"
    >

    <title>Anniversary Image AR</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- MindAR Image Tracking -->
    <script
        src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">
    </script>

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .ar-instructions {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);

            width: calc(100% - 32px);
            max-width: 440px;

            padding: 14px 18px;
            border-radius: 14px;

            background: rgba(0, 0, 0, 0.72);
            color: white;
            text-align: center;

            z-index: 10;
            pointer-events: none;
        }

        .ar-instructions h1 {
            margin: 0 0 6px;
            font-size: 18px;
        }

        .ar-instructions p {
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
        }

        #status {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;

            border-radius: 999px;
            background: #374151;

            font-size: 13px;
            font-weight: bold;
        }

        #status.target-found {
            background: #15803d;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const target = document.querySelector("#anniversary-target");
            const status = document.querySelector("#status");

            target.addEventListener("targetFound", function () {
                status.textContent = "Anniversary poster detected";
                status.classList.add("target-found");
            });

            target.addEventListener("targetLost", function () {
                status.textContent = "Point your camera at the poster";
                status.classList.remove("target-found");
            });
        });
    </script>
</head>

<body>

    <div class="ar-instructions">
        <h1>Anniversary AR Experience</h1>

        <p>
            Point your camera at the anniversary poster.
            Keep the whole poster visible and hold your phone steadily.
        </p>

        <div id="status">
            Point your camera at the poster
        </div>
    </div>

    <a-scene
    
        mindar-image="
            imageTargetSrc: ./targets/targets.mind;
            warmupTolerance: 5;
            missTolerance: 10;
        "

        color-space="sRGB"

        renderer="
            colorManagement: true;
            physicallyCorrectLights: true;
            antialias: true;
        "

        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        loading-screen="enabled: true">
<a-assets timeout="30000">
    <a-asset-item
        id="trophy-model"
        src="./models/anniversary-trophy.glb">
    </a-asset-item>
</a-assets>

<a-assets timeout="30000">
    <a-asset-item
        id="trophy-model2"
        src="./models/anniversary-trophy.glb">
    </a-asset-item>
</a-assets>
        <!-- Camera controlled by MindAR -->
        <a-camera
            position="0 0 0"
            look-controls="enabled: false">
        </a-camera>

        <!--
            targetIndex: 0 means the first image
            compiled inside targets.mind.
        -->
<a-entity
    id="anniversary-target"
    mindar-image-target="targetIndex: 0">

    <!-- 3D trophy -->
    <a-entity
        id="trophy"
        gltf-model="#trophy-model"
        position="10 0 0.1"
        rotation="0 0 0"
        scale="1.0 1.0 1.0">
    </a-entity>

        <a-entity
        id="trophy"
        gltf-model="#trophy-model"
        position="0 0 0.1"
        rotation="0 0 0"
        scale="1.0 1.0 1.0">
    </a-entity>

    <!-- Text above the trophy -->
    <a-text
        value="Happy Anniversary!"
        position="0 0.42 0.05"
        align="center"
        color="#FFFFFF"
        width="2">
    </a-text>

</a-entity>

    </a-scene>

</body>
</html>
